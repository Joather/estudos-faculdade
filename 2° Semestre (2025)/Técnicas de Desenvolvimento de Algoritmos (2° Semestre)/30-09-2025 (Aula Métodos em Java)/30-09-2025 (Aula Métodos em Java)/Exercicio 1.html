<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Consumo de Combustível</title>
</head>
<body>
    <h2>Calculadora de Consumo de Combustível</h2>
    <form onsubmit="calcularViagem(); return false;">
        <input type="number" id="kmInicial" placeholder="Quilometragem inicial" step="any" required>
        <input type="number" id="kmFinal" placeholder="Quilometragem final" step="any" required>
        <input type="number" id="litros" placeholder="Litros gastos" step="any" required>
        <input type="number" id="precoLitro" placeholder="Preço do litro" step="any" required>
        <button type="submit">Calcular</button>
    </form>
    <textarea id="resultado" rows="5" cols="50" readonly></textarea>

    <script>
        function calcularConsumo(kmInicial, kmFinal, litros, precoLitro) {
            const distancia = kmFinal - kmInicial;
            const consumoMedio = distancia / litros;
            const valorGasto = litros * precoLitro;

            return {
                distancia: distancia,
                consumoMedio: consumoMedio,
                valorGasto: valorGasto
            };
        }

        function calcularViagem() {
            const kmInicial = parseFloat(document.getElementById("kmInicial").value);
            const kmFinal = parseFloat(document.getElementById("kmFinal").value);
            const litros = parseFloat(document.getElementById("litros").value);
            const precoLitro = parseFloat(document.getElementById("precoLitro").value);

            if (isNaN(kmInicial) || isNaN(kmFinal) || isNaN(litros) || isNaN(precoLitro) ||
                kmFinal <= kmInicial || litros <= 0 || precoLitro <= 0) {
                document.getElementById("resultado").value = "Digite valores válidos para todos os campos.";
                return;
            }

            const resultado = calcularConsumo(kmInicial, kmFinal, litros, precoLitro);

            document.getElementById("resultado").value =
                `Distância percorrida: ${resultado.distancia.toFixed(2)} km\n` +
                `Consumo médio: ${resultado.consumoMedio.toFixed(2)} km/l\n` +
                `Valor gasto: R$ ${resultado.valorGasto.toFixed(2)}`;
        }
    </script>
</body>
</html>
